version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: interview-portal-postgres
    environment:
      POSTGRES_DB: interview_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interview-network

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: interview-portal-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_portal
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interview-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: interview-portal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - interview-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  interview-network:
    driver: bridge
